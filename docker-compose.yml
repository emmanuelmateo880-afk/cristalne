version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cristalne_db
    environment:
      POSTGRES_DB: cristalne
      POSTGRES_USER: cristalne
      POSTGRES_PASSWORD: cristalne_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cristalne"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cristalne_app
    environment:
      DATABASE_URL: postgresql://cristalne:cristalne_password_123@postgres:5432/cristalne
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-here-min-32-characters
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: cristalne_network
